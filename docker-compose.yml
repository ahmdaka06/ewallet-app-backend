services:
  postgres:
    image: postgres:16
    container_name: ewallet-postgres
    restart: always
    environment:
      POSTGRES_USER: ewallet
      POSTGRES_PASSWORD: ewallet
      POSTGRES_DB: ewallet_db
    ports:
      - "5432:5432"
    volumes:
      - ewallet_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ewallet-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  ewallet_postgres_data: